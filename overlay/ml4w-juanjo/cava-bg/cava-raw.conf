# cava-raw.conf — config de cava para el WIDGET del fondo (SUPER+ALT+C).
# Se despliega a ~/.config/ml4w-juanjo/cava-bg/cava-raw.conf (namespace propio, cero deriva).
#
# Es SEPARADA de la del tile (~/.config/cava/config) a propósito: aquella pinta con ncurses en
# una terminal, y esta escupe números por stdout para que los dibuje el QML.
#
# `bars` debe coincidir con `barCount` en quickshell/cavabg/shell.qml. Si cambias uno, cambia
# el otro: el widget dimensiona la franja contando barras.

[general]
framerate = 60
bars = 64
autosens = 1

[input]
# Monitor del sink de PipeWire → visualiza cualquier audio del sistema.
# 'auto' verificado en esta máquina (ver 00-contexto-y-hardware.md §Audio).
method = pulse
source = auto

[output]
# Modo raw: en vez de dibujar, imprime "12;20;15;…;" por línea. Lo parsea el SplitParser del QML.
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 100
channels = stereo

[smoothing]
noise_reduction = 77
