# hyprsunset.conf — luz nocturna automática por horario (hyprsunset v0.4.0+).
# El daemon aplica el perfil cuyo `time` es el más reciente ya pasado, ciclando a diario.
# Versionado en el overlay: se despliega con aplicar.sh; NO editar el vivo a mano.

# Día (07:00–21:00): sin filtro, colores neutros reales.
profile {
    time = 7:00
    identity = true
}

# Noche (21:00–07:00): cálido a 4000K, sin atenuar (gamma 1.0).
profile {
    time = 21:00
    temperature = 4000
    gamma = 1.0
}
